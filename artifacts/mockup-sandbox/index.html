<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarurat Care - Support Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <nav class="bg-white shadow-sm p-4">
        <h1 class="text-xl font-bold text-blue-600">Jarurat Care</h1>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <section class="bg-white p-8 rounded-xl shadow-md mb-8">
            <h2 class="text-2xl font-bold mb-4">Volunteer Registration</h2>
            <form id="regForm" class="space-y-4">
                <input type="text" placeholder="Full Name" class="w-full p-3 border rounded-lg" required>
                <input type="email" placeholder="Email Address" class="w-full p-3 border rounded-lg" required>
                <textarea placeholder="How can you help?" class="w-full p-3 border rounded-lg" rows="3"></textarea>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">Submit Registration</button>
            </form>
        </section>

        <section class="fixed bottom-5 right-5 w-80 bg-white shadow-2xl rounded-t-xl border border-gray-200">
            <div class="bg-blue-600 p-3 rounded-t-xl text-white font-bold">FAQ Assistant (AI)</div>
            <div id="chat-display" class="h-48 p-4 overflow-y-auto text-sm space-y-2">
                <p class="text-gray-500 italic">Try asking: "help", "volunteer", or "urgent"</p>
            </div>
            <div class="p-2 border-t flex">
                <input id="chat-input" type="text" placeholder="Ask something..." class="flex-grow p-2 text-sm outline-none">
                <button onclick="handleChat()" class="bg-blue-600 text-white px-3 py-1 rounded">Send</button>
            </div>
        </section>
    </main>

    <script src="src/main.tsx"></script>
</body>
</html>
